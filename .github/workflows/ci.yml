name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  api:
    name: API build and tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: punta_venta_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d punta_venta_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      LOG_LEVEL: error
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/punta_venta_test?schema=public
      CORS_ORIGIN: http://localhost:5173
      JWT_ACCESS_SECRET: test_access_secret_minimum_32_characters
      JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_characters
      TOKEN_HASH_PEPPER: test_token_pepper_minimum_32_characters
      JWT_ACCESS_EXPIRES_IN_SECONDS: 900
      REFRESH_TOKEN_TTL_DAYS: 7
      BCRYPT_ROUNDS: 4
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build API
        run: npm run build

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:4000/api

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - api
      - web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API and web images
        run: docker compose build api web
