name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Repository guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate lockfiles and dependency boundaries
        run: npm run ci:validate-lockfiles

      - name: Validate Docker Compose configuration
        run: docker compose config >/dev/null

  api:
    name: API quality gate
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: punta_venta_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d punta_venta_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      LOG_LEVEL: error
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/punta_venta_test?schema=public
      CORS_ORIGIN: http://localhost:5173
      JWT_ACCESS_SECRET: test_access_secret_minimum_32_characters
      JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_characters
      TOKEN_HASH_PEPPER: test_token_pepper_minimum_32_characters
      JWT_ACCESS_EXPIRES_IN_SECONDS: 900
      REFRESH_TOKEN_TTL_DAYS: 7
      BCRYPT_ROUNDS: 4
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      - name: Run critical API tests
        run: npm test -- critical-routes.permissions.test.ts auth.middleware.test.ts sales.service.test.ts products.import.test.ts reports.service.test.ts --runInBand

      - name: Run full API test suite
        run: npm test -- --runInBand

      - name: Build API
        run: npm run build

  web:
    name: Web quality gate
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run critical web tests
        run: npm run test -- --run src/auth/permissions.test.ts src/layout/navigation.test.tsx

      - name: Typecheck and build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:4000/api


  web-e2e:
    name: Web E2E smoke gate
    runs-on: ubuntu-latest
    needs:
      - validate
      - web
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run e2e
        env:
          VITE_API_URL: http://localhost:4000/api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  docker:
    name: Docker build gate
    runs-on: ubuntu-latest
    needs:
      - validate
      - api
      - web
      - web-e2e
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config >/dev/null

      - name: Build API and web images
        run: docker compose build --pull api web
