name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  api:
    name: API build and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pos_senior_db?schema=public

      - name: Run tests
        run: npm test -- --runInBand
        env:
          NODE_ENV: test
          LOG_LEVEL: error
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pos_senior_db?schema=public
          CORS_ORIGIN: http://localhost:5173
          JWT_ACCESS_SECRET: test_access_secret_minimum_32_characters
          JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_characters
          TOKEN_HASH_PEPPER: test_token_pepper_minimum_32_characters
          JWT_ACCESS_EXPIRES_IN_SECONDS: 900
          REFRESH_TOKEN_TTL_DAYS: 7
          BCRYPT_ROUNDS: 4

      - name: Build API
        run: npm run build
        env:
          NODE_ENV: test
          LOG_LEVEL: error
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pos_senior_db?schema=public
          CORS_ORIGIN: http://localhost:5173
          JWT_ACCESS_SECRET: test_access_secret_minimum_32_characters
          JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_characters
          TOKEN_HASH_PEPPER: test_token_pepper_minimum_32_characters
          JWT_ACCESS_EXPIRES_IN_SECONDS: 900
          REFRESH_TOKEN_TTL_DAYS: 7
          BCRYPT_ROUNDS: 4

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:4000/api

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - api
      - web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API and web images
        run: docker compose build api web
