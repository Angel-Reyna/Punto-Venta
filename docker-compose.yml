services:
  postgres:
    image: postgres:16
    container_name: pos_senior_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pos_senior_db

    ports:
      - "5432:5432"

    volumes:
      - pos_pg_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pos_senior_pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: Admin12345

    ports:
      - "5050:80"

    depends_on:
      - postgres

volumes:
  pos_pg_data: